<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sine-Gordon 3D Visualization</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050505; color: white; font-family: sans-serif; }
        canvas { display: block; }
        .controls {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.75);
            padding: 20px;
            border-radius: 12px;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 300px;
            z-index: 10;
        }
        input[type=range] { accent-color: #3b82f6; }
    </style>
</head>
<body>

<div class="controls">
    <h1 class="text-xl font-bold mb-1 text-blue-400">Sine-Gordon 3D</h1>
    <p class="text-[10px] mb-4 opacity-70">$\phi_{tt} - \Delta\phi + \sin(\phi) = 0$</p>
    
    <div class="space-y-4">
        <div>
            <label class="block text-xs font-medium mb-1 uppercase tracking-wider text-gray-400">Time Step (dt)</label>
            <input type="range" id="speed" min="0.01" max="0.1" step="0.01" value="0.05" class="w-full">
        </div>

        <div>
            <label class="block text-xs font-medium mb-1 uppercase tracking-wider text-gray-400">Damping</label>
            <input type="range" id="damping" min="0.95" max="1.0" step="0.001" value="0.995" class="w-full">
        </div>

        <div>
            <label class="block text-xs font-medium mb-1 uppercase tracking-wider text-blue-300">Area Scale (1x - 10x)</label>
            <input type="range" id="areaScale" min="1" max="10" step="0.5" value="1" class="w-full">
        </div>

        <div class="pt-2 border-t border-white/10">
            <div class="flex items-center justify-between mb-1">
                <label class="block text-xs font-medium uppercase tracking-wider text-purple-400">Auto Pulse</label>
                <input type="checkbox" id="autoPulseToggle" class="w-4 h-4 rounded bg-gray-700 border-gray-600">
            </div>
            <label class="block text-[10px] mb-1 text-gray-400">Pulse Interval (ms)</label>
            <input type="range" id="pulseInterval" min="500" max="5000" step="100" value="2000" class="w-full">
        </div>

        <div class="flex gap-2 pt-2">
            <button id="resetBtn" class="bg-gray-700 hover:bg-gray-600 px-3 py-2 rounded text-xs transition flex-1">Reset</button>
            <button id="disturbBtn" class="bg-blue-600 hover:bg-blue-700 px-3 py-2 rounded text-xs transition flex-1">Manual Pulse</button>
        </div>
    </div>

    <div class="mt-4 text-[10px] opacity-50 leading-tight">
        Drag to rotate • Scroll to zoom<br>
        64x64 Finite Difference Grid
    </div>
</div>

<script>
    let scene, camera, renderer, mesh, geometry, gridHelper;
    const N = 64; 
    const L_BASE = 20; 
    let L = L_BASE;
    let dx = L / N;
    
    let u = new Float32Array(N * N);     
    let uPrev = new Float32Array(N * N); 
    let uNext = new Float32Array(N * N); 

    let dt = 0.05;
    let damping = 0.995;
    
    // Auto-pulse state
    let autoPulseEnabled = false;
    let lastPulseTime = 0;
    let pulseFrequency = 2000;

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
        camera.position.set(20, 20, 20);
        camera.lookAt(0, 0, 0);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0x404040, 2);
        scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xffffff, 1.2);
        directionalLight.position.set(10, 50, 10);
        scene.add(directionalLight);

        // Initial Geometry
        createGeometry();

        gridHelper = new THREE.GridHelper(L, 10, 0x444444, 0x222222);
        gridHelper.position.y = -2.5;
        scene.add(gridHelper);

        resetField();

        let isDragging = false;
        let prevMouse = { x: 0, y: 0 };
        
        window.addEventListener('mousedown', (e) => { isDragging = true; prevMouse = { x: e.clientX, y: e.clientY }; });
        window.addEventListener('mouseup', () => isDragging = false);
        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const dxMove = e.clientX - prevMouse.x;
            const dyMove = e.clientY - prevMouse.y;
            
            const rotationMatrix = new THREE.Matrix4();
            rotationMatrix.makeRotationY(dxMove * 0.005);
            camera.position.applyMatrix4(rotationMatrix);
            
            const axis = new THREE.Vector3().crossVectors(camera.position, camera.up).normalize();
            rotationMatrix.makeRotationAxis(axis, dyMove * 0.005);
            camera.position.applyMatrix4(rotationMatrix);
            
            camera.lookAt(0, 0, 0);
            prevMouse = { x: e.clientX, y: e.clientY };
        });

        window.addEventListener('wheel', (e) => {
            const factor = e.deltaY > 0 ? 1.05 : 0.95;
            camera.position.multiplyScalar(factor);
            e.preventDefault();
        }, { passive: false });

        window.addEventListener('resize', onWindowResize);
    }

    function createGeometry() {
        if (mesh) scene.remove(mesh);
        
        geometry = new THREE.PlaneBufferGeometry(L, L, N - 1, N - 1);
        geometry.rotateX(-Math.PI / 2);

        const material = new THREE.MeshPhongMaterial({
            color: 0x3b82f6,
            side: THREE.DoubleSide,
            shininess: 80,
            specular: 0x444444
        });

        mesh = new THREE.Mesh(geometry, material);
        scene.add(mesh);
    }

    function updateAreaScale(scale) {
        L = L_BASE * scale;
        dx = L / N;
        
        // Re-create geometry with new size
        createGeometry();
        
        // Update grid helper
        scene.remove(gridHelper);
        gridHelper = new THREE.GridHelper(L, 10, 0x444444, 0x222222);
        gridHelper.position.y = -2.5;
        scene.add(gridHelper);
        
        // Maintain camera focus relative to new size if needed
        // (optional: camera.position.multiplyScalar(1.1) or similar)
    }

    function resetField() {
        for (let i = 0; i < N * N; i++) {
            u[i] = 0;
            uPrev[i] = 0;
            uNext[i] = 0;
        }
        pulse();
    }

    function pulse() {
        const cx = Math.floor(N/2);
        const cy = Math.floor(N/2);
        
        // Scale pulse radius with the area scale to keep it visible
        const scaleFactor = L / L_BASE;
        const radius = (4 + Math.random() * 2);
        const strength = 4.0 + Math.random() * 1.5;

        for (let i = 0; i < N; i++) {
            for (let j = 0; j < N; j++) {
                const dist = Math.sqrt((i-cx)**2 + (j-cy)**2);
                if (dist < radius) {
                    const val = strength * Math.cos((dist/radius) * (Math.PI/2));
                    u[i * N + j] += val;
                    uPrev[i * N + j] += val;
                }
            }
        }
    }

    function stepSimulation() {
        const c2 = (dt / dx) ** 2;
        const dt2 = dt * dt;

        for (let i = 1; i < N - 1; i++) {
            for (let j = 1; j < N - 1; j++) {
                const idx = i * N + j;
                const laplacian = (
                    u[(i + 1) * N + j] +
                    u[(i - 1) * N + j] +
                    u[i * N + (j + 1)] +
                    u[i * N + (j - 1)] -
                    4 * u[idx]
                );
                uNext[idx] = (2 * u[idx] - uPrev[idx] + c2 * laplacian - dt2 * Math.sin(u[idx])) * damping;
            }
        }
        uPrev.set(u);
        u.set(uNext);
    }

    function updateGeometry() {
        const positions = geometry.attributes.position.array;
        for (let i = 0; i < N; i++) {
            for (let j = 0; j < N; j++) {
                const idx = (i * N + j) * 3 + 1; 
                positions[idx] = u[i * N + j] * 0.75;
            }
        }
        geometry.attributes.position.needsUpdate = true;
        geometry.computeVertexNormals();
    }

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate(time) {
        requestAnimationFrame(animate);
        
        if (autoPulseEnabled && time - lastPulseTime > pulseFrequency) {
            pulse();
            lastPulseTime = time;
        }

        for(let i=0; i<3; i++) stepSimulation();
        updateGeometry();
        renderer.render(scene, camera);
    }

    // UI Listeners
    document.getElementById('speed').addEventListener('input', (e) => dt = parseFloat(e.target.value));
    document.getElementById('damping').addEventListener('input', (e) => damping = parseFloat(e.target.value));
    document.getElementById('areaScale').addEventListener('input', (e) => updateAreaScale(parseFloat(e.target.value)));
    document.getElementById('resetBtn').addEventListener('click', resetField);
    document.getElementById('disturbBtn').addEventListener('click', pulse);
    
    const autoToggle = document.getElementById('autoPulseToggle');
    autoToggle.addEventListener('change', (e) => {
        autoPulseEnabled = e.target.checked;
        if (autoPulseEnabled) lastPulseTime = performance.now();
    });

    document.getElementById('pulseInterval').addEventListener('input', (e) => {
        pulseFrequency = parseInt(e.target.value);
    });

    window.onload = () => {
        init();
        animate(0);
    };
</script>

</body>
</html>
