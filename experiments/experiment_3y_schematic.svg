<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 750" width="900" height="750">
  <defs>
    <!-- Coil pattern -->
    <pattern id="coilHatch" patternUnits="userSpaceOnUse" width="4" height="4">
      <path d="M0,0 L4,4 M4,0 L0,4" stroke="#b87333" stroke-width="0.5" opacity="0.3"/>
    </pattern>
    <!-- Glow for active elements -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Arrow marker -->
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e74c3c"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3498db"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2ecc71"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="750" fill="#1a1a2e" rx="8"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" fill="#ecf0f1" font-family="monospace" font-size="20" font-weight="bold">3Y Phase-Decoupling Test Rig — Top-Down Schematic</text>
  <text x="450" y="55" text-anchor="middle" fill="#7f8c8d" font-family="monospace" font-size="12">Tier 2 Configuration (Copper Coils + Torsion Balance)</text>

  <!-- ============================================ -->
  <!-- VIBRATION ISOLATION BASE (outermost layer)   -->
  <!-- ============================================ -->
  <rect x="100" y="80" width="700" height="560" rx="12" fill="#2c2c3e" stroke="#555" stroke-width="1.5" stroke-dasharray="8,4"/>
  <text x="110" y="100" fill="#7f8c8d" font-family="monospace" font-size="10">VIBRATION ISOLATION</text>
  <text x="110" y="114" fill="#666" font-family="monospace" font-size="9">(concrete slab + inner tube + sand box)</text>

  <!-- ============================================ -->
  <!-- FARADAY CAGE / SHIELDING BOX                 -->
  <!-- ============================================ -->
  <rect x="150" y="130" width="600" height="480" rx="8" fill="#1e2a3a" stroke="#3498db" stroke-width="2"/>
  <text x="160" y="150" fill="#3498db" font-family="monospace" font-size="11" font-weight="bold">GROUNDED SHIELDING BOX (Faraday cage)</text>
  <text x="160" y="164" fill="#2980b9" font-family="monospace" font-size="9">Blocks EM interference — only gravity passes through</text>

  <!-- ============================================ -->
  <!-- MU-METAL LAYER (Tier 3)                      -->
  <!-- ============================================ -->
  <rect x="175" y="178" width="550" height="410" rx="6" fill="none" stroke="#9b59b6" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="185" y="194" fill="#9b59b6" font-family="monospace" font-size="9">[Tier 3] MU-METAL MAGNETIC SHIELD</text>

  <!-- ============================================ -->
  <!-- TRIANGULAR FRAME (aluminium, 30cm sides)     -->
  <!-- ============================================ -->
  <!-- Triangle vertices: top=450,240  bottom-left=280,535  bottom-right=620,535 -->
  <!-- Side length ~300px representing 30cm -->

  <!-- Triangle edges -->
  <line x1="450" y1="240" x2="280" y2="535" stroke="#95a5a6" stroke-width="3"/>
  <line x1="280" y1="535" x2="620" y2="535" stroke="#95a5a6" stroke-width="3"/>
  <line x1="620" y1="535" x2="450" y2="240" stroke="#95a5a6" stroke-width="3"/>

  <!-- Dimension labels -->
  <text x="345" y="385" fill="#7f8c8d" font-family="monospace" font-size="10" transform="rotate(-60,345,385)">30 cm</text>
  <text x="450" y="558" fill="#7f8c8d" font-family="monospace" font-size="10" text-anchor="middle">30 cm</text>
  <text x="555" y="385" fill="#7f8c8d" font-family="monospace" font-size="10" transform="rotate(60,555,385)">30 cm</text>

  <!-- 120 degree angle markers at centre -->
  <path d="M 450,410 L 450,380" stroke="#555" stroke-width="0.5" stroke-dasharray="2,2"/>
  <path d="M 450,410 L 424,425" stroke="#555" stroke-width="0.5" stroke-dasharray="2,2"/>
  <path d="M 450,410 L 476,425" stroke="#555" stroke-width="0.5" stroke-dasharray="2,2"/>
  <text x="450" y="372" fill="#555" font-family="monospace" font-size="8" text-anchor="middle">120</text>
  <text x="415" y="438" fill="#555" font-family="monospace" font-size="8" text-anchor="middle">120</text>
  <text x="485" y="438" fill="#555" font-family="monospace" font-size="8" text-anchor="middle">120</text>

  <!-- ============================================ -->
  <!-- COIL 1 (top vertex) — phase = 0 deg          -->
  <!-- ============================================ -->
  <circle cx="450" cy="240" r="28" fill="#3d2b1a" stroke="#b87333" stroke-width="3"/>
  <circle cx="450" cy="240" r="20" fill="url(#coilHatch)" stroke="#b87333" stroke-width="1.5"/>
  <circle cx="450" cy="240" r="8" fill="#1a1a2e" stroke="#b87333" stroke-width="1"/>
  <text x="450" y="207" text-anchor="middle" fill="#e67e22" font-family="monospace" font-size="12" font-weight="bold">COIL 1</text>
  <text x="450" y="282" text-anchor="middle" fill="#f39c12" font-family="monospace" font-size="10">phase = 0</text>
  <!-- Sine wave label -->
  <text x="515" y="230" fill="#e67e22" font-family="monospace" font-size="9">sin(2*pi*f*t)</text>

  <!-- ============================================ -->
  <!-- COIL 2 (bottom-left) — phase = 120 deg       -->
  <!-- ============================================ -->
  <circle cx="280" cy="535" r="28" fill="#3d2b1a" stroke="#b87333" stroke-width="3"/>
  <circle cx="280" cy="535" r="20" fill="url(#coilHatch)" stroke="#b87333" stroke-width="1.5"/>
  <circle cx="280" cy="535" r="8" fill="#1a1a2e" stroke="#b87333" stroke-width="1"/>
  <text x="230" y="570" fill="#e67e22" font-family="monospace" font-size="12" font-weight="bold">COIL 2</text>
  <text x="230" y="585" fill="#f39c12" font-family="monospace" font-size="10">phase = 120</text>
  <text x="218" y="520" fill="#e67e22" font-family="monospace" font-size="9">sin(2*pi*f*t + 2*pi/3)</text>

  <!-- ============================================ -->
  <!-- COIL 3 (bottom-right) — phase = 240 deg      -->
  <!-- ============================================ -->
  <circle cx="620" cy="535" r="28" fill="#3d2b1a" stroke="#b87333" stroke-width="3"/>
  <circle cx="620" cy="535" r="20" fill="url(#coilHatch)" stroke="#b87333" stroke-width="1.5"/>
  <circle cx="620" cy="535" r="8" fill="#1a1a2e" stroke="#b87333" stroke-width="1"/>
  <text x="670" y="570" fill="#e67e22" font-family="monospace" font-size="12" font-weight="bold">COIL 3</text>
  <text x="670" y="585" fill="#f39c12" font-family="monospace" font-size="10">phase = 240</text>
  <text x="657" y="520" fill="#e67e22" font-family="monospace" font-size="9">sin(2*pi*f*t + 4*pi/3)</text>

  <!-- ============================================ -->
  <!-- PHASE FIELD ARROWS (coils → centre)          -->
  <!-- ============================================ -->
  <!-- Coil 1 → centre -->
  <line x1="450" y1="270" x2="450" y2="385" stroke="#e74c3c" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrow)"/>
  <!-- Coil 2 → centre -->
  <line x1="305" y1="518" x2="425" y2="420" stroke="#2ecc71" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowGreen)"/>
  <!-- Coil 3 → centre -->
  <line x1="595" y1="518" x2="475" y2="420" stroke="#3498db" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowBlue)"/>

  <!-- ============================================ -->
  <!-- Y-JUNCTION CENTRE NODE (Z3 defect)           -->
  <!-- ============================================ -->
  <circle cx="450" cy="410" r="22" fill="none" stroke="#e74c3c" stroke-width="2" filter="url(#glow)" opacity="0.6"/>
  <circle cx="450" cy="410" r="15" fill="#2c1a1a" stroke="#e74c3c" stroke-width="2.5"/>
  <text x="450" y="414" text-anchor="middle" fill="#e74c3c" font-family="monospace" font-size="9" font-weight="bold">Z3</text>
  <text x="450" y="448" text-anchor="middle" fill="#e74c3c" font-family="monospace" font-size="10" font-weight="bold">Y-JUNCTION NODE</text>
  <text x="450" y="462" text-anchor="middle" fill="#c0392b" font-family="monospace" font-size="9">psi_1 + psi_2 + psi_3 = 0</text>
  <text x="450" y="476" text-anchor="middle" fill="#c0392b" font-family="monospace" font-size="9">alpha = cos(psi - phi) = 0</text>

  <!-- ============================================ -->
  <!-- TEST MASS (at centre, on torsion balance)    -->
  <!-- ============================================ -->
  <rect x="438" y="396" width="24" height="24" rx="3" fill="#7f8c8d" stroke="#bdc3c7" stroke-width="1.5"/>
  <text x="450" y="412" text-anchor="middle" fill="#ecf0f1" font-family="monospace" font-size="7" font-weight="bold">Pb</text>

  <!-- Torsion balance arm (horizontal bar through test mass) -->
  <line x1="395" y1="408" x2="505" y2="408" stroke="#bdc3c7" stroke-width="2"/>
  <!-- Small masses at ends -->
  <rect x="388" y="402" width="10" height="12" rx="2" fill="#7f8c8d" stroke="#bdc3c7" stroke-width="1"/>
  <rect x="502" y="402" width="10" height="12" rx="2" fill="#7f8c8d" stroke="#bdc3c7" stroke-width="1"/>
  <!-- Tungsten wire (going up = into page, shown as dot) -->
  <circle cx="450" cy="395" r="3" fill="#d4af37" stroke="#f1c40f" stroke-width="1"/>
  <text x="465" y="392" fill="#f1c40f" font-family="monospace" font-size="8">tungsten wire (up)</text>

  <!-- ============================================ -->
  <!-- MIRROR + LASER READOUT                       -->
  <!-- ============================================ -->
  <!-- Mirror on torsion arm -->
  <rect x="445" y="414" width="10" height="3" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="0.5"/>
  <text x="462" y="425" fill="#bdc3c7" font-family="monospace" font-size="7">mirror</text>

  <!-- Laser source (left side) -->
  <rect x="195" y="398" width="50" height="16" rx="3" fill="#922" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="220" y="410" text-anchor="middle" fill="#ecf0f1" font-family="monospace" font-size="8" font-weight="bold">LASER</text>
  <text x="220" y="426" text-anchor="middle" fill="#c0392b" font-family="monospace" font-size="7">&lt;5 mW red</text>

  <!-- Laser beam → mirror -->
  <line x1="245" y1="406" x2="445" y2="416" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="2,2" opacity="0.8"/>

  <!-- Reflected beam → photodiode -->
  <line x1="455" y1="416" x2="710" y2="350" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="2,2" opacity="0.8"/>

  <!-- Photodiode (right side) -->
  <rect x="700" y="338" width="40" height="24" rx="3" fill="#1a3a1a" stroke="#2ecc71" stroke-width="1.5"/>
  <text x="720" y="354" text-anchor="middle" fill="#2ecc71" font-family="monospace" font-size="8" font-weight="bold">PD</text>
  <text x="720" y="376" text-anchor="middle" fill="#27ae60" font-family="monospace" font-size="7">photodiode</text>
  <text x="720" y="388" text-anchor="middle" fill="#27ae60" font-family="monospace" font-size="7">(BPW34)</text>

  <!-- ============================================ -->
  <!-- EXTERNAL EQUIPMENT (outside shielding)       -->
  <!-- ============================================ -->

  <!-- Arduino 1 (signal generator) -->
  <rect x="40" y="650" width="130" height="50" rx="5" fill="#1a3a2e" stroke="#2ecc71" stroke-width="2"/>
  <text x="105" y="672" text-anchor="middle" fill="#2ecc71" font-family="monospace" font-size="10" font-weight="bold">Arduino Mega</text>
  <text x="105" y="688" text-anchor="middle" fill="#27ae60" font-family="monospace" font-size="8">3-phase generator</text>

  <!-- Wires from Arduino to coils -->
  <path d="M 105,650 L 105,610 L 150,610" stroke="#2ecc71" stroke-width="1.5" fill="none" stroke-dasharray="4,2"/>
  <text x="90" y="605" fill="#27ae60" font-family="monospace" font-size="7">twisted pairs</text>

  <!-- Amplifier -->
  <rect x="200" y="650" width="130" height="50" rx="5" fill="#2e1a3a" stroke="#9b59b6" stroke-width="2"/>
  <text x="265" y="672" text-anchor="middle" fill="#9b59b6" font-family="monospace" font-size="10" font-weight="bold">3x TDA2030</text>
  <text x="265" y="688" text-anchor="middle" fill="#8e44ad" font-family="monospace" font-size="8">amplifier boards</text>

  <!-- Arduino 2 (data acquisition) -->
  <rect x="560" y="650" width="130" height="50" rx="5" fill="#1a3a2e" stroke="#2ecc71" stroke-width="2"/>
  <text x="625" y="672" text-anchor="middle" fill="#2ecc71" font-family="monospace" font-size="10" font-weight="bold">Arduino Due</text>
  <text x="625" y="688" text-anchor="middle" fill="#27ae60" font-family="monospace" font-size="8">lock-in + DAQ</text>

  <!-- Laptop -->
  <rect x="730" y="650" width="130" height="50" rx="5" fill="#2a2a3e" stroke="#ecf0f1" stroke-width="2"/>
  <text x="795" y="672" text-anchor="middle" fill="#ecf0f1" font-family="monospace" font-size="10" font-weight="bold">LAPTOP</text>
  <text x="795" y="688" text-anchor="middle" fill="#bdc3c7" font-family="monospace" font-size="8">Python logging</text>

  <!-- Connection lines (external) -->
  <line x1="170" y1="675" x2="200" y2="675" stroke="#95a5a6" stroke-width="1.5"/>
  <line x1="690" y1="675" x2="730" y2="675" stroke="#95a5a6" stroke-width="1.5"/>

  <!-- 12V PSU -->
  <rect x="380" y="650" width="130" height="50" rx="5" fill="#3a2a1a" stroke="#f39c12" stroke-width="2"/>
  <text x="445" y="672" text-anchor="middle" fill="#f39c12" font-family="monospace" font-size="10" font-weight="bold">12V 3A PSU</text>
  <text x="445" y="688" text-anchor="middle" fill="#e67e22" font-family="monospace" font-size="8">power supply</text>

  <!-- Power lines -->
  <line x1="380" y1="675" x2="330" y2="675" stroke="#f39c12" stroke-width="1.5"/>
  <line x1="510" y1="675" x2="560" y2="675" stroke="#f39c12" stroke-width="1.5"/>

  <!-- ============================================ -->
  <!-- LEGEND                                       -->
  <!-- ============================================ -->
  <rect x="15" y="80" width="80" height="130" rx="4" fill="#1a1a2e" stroke="#555" stroke-width="1"/>
  <text x="55" y="97" text-anchor="middle" fill="#ecf0f1" font-family="monospace" font-size="9" font-weight="bold">LEGEND</text>
  <line x1="25" y1="108" x2="65" y2="108" stroke="#e74c3c" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="25" y="120" fill="#e74c3c" font-family="monospace" font-size="7">phase field</text>
  <line x1="25" y1="133" x2="65" y2="133" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="2,2" opacity="0.8"/>
  <text x="25" y="145" fill="#e74c3c" font-family="monospace" font-size="7">laser beam</text>
  <circle cx="35" cy="158" r="6" fill="#3d2b1a" stroke="#b87333" stroke-width="2"/>
  <text x="48" y="162" fill="#b87333" font-family="monospace" font-size="7">coil</text>
  <rect x="29" y="172" width="12" height="12" rx="2" fill="#7f8c8d" stroke="#bdc3c7" stroke-width="1"/>
  <text x="48" y="182" fill="#bdc3c7" font-family="monospace" font-size="7">mass</text>
  <circle cx="35" cy="198" r="3" fill="#d4af37" stroke="#f1c40f" stroke-width="1"/>
  <text x="48" y="202" fill="#f1c40f" font-family="monospace" font-size="7">wire</text>

  <!-- ============================================ -->
  <!-- SCALE BAR                                    -->
  <!-- ============================================ -->
  <line x1="760" y1="580" x2="760" y2="600" stroke="#95a5a6" stroke-width="1"/>
  <line x1="760" y1="590" x2="830" y2="590" stroke="#95a5a6" stroke-width="2"/>
  <line x1="830" y1="580" x2="830" y2="600" stroke="#95a5a6" stroke-width="1"/>
  <text x="795" y="610" text-anchor="middle" fill="#95a5a6" font-family="monospace" font-size="9">~10 cm</text>

  <!-- ============================================ -->
  <!-- NOTES                                        -->
  <!-- ============================================ -->
  <text x="450" y="735" text-anchor="middle" fill="#555" font-family="monospace" font-size="9">TOP-DOWN VIEW — Not to scale — Tier 2 configuration shown (R5,000 / $300)</text>
</svg>
