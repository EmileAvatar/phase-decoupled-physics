<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spacetime-Matter Field Visualization</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- OrbitControls is needed for mouse interaction -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050505; font-family: sans-serif; }
        canvas { display: block; }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            background: rgba(0, 0, 0, 0.8);
            padding: 20px;
            border-radius: 12px;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            max-width: 320px;
            pointer-events: auto;
        }
        .slider-group { margin-bottom: 15px; }
        .label-val { display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 5px; }
        input[type=range] { width: 100%; cursor: pointer; }
        .legend { display: flex; align-items: center; gap: 10px; margin-top: 10px; font-size: 0.8rem; }
        .dot-phi { width: 12px; height: 12px; background: #00f2ff; border-radius: 50%; }
        .dot-psi { width: 12px; height: 12px; background: #ff0077; border-radius: 50%; }
        .controls-hint { font-size: 10px; color: #888; margin-top: 10px; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

<div id="ui">
    <h2 class="text-xl font-bold mb-1">Field Lagrangian</h2>
    <p class="text-[10px] text-gray-400 mb-4 font-mono">L = ½(∂μφ)² + ½(∂μψ)² - g cos(φ-ψ) + g cos(φ+ψ)</p>
    
    <div class="slider-group">
        <div class="label-val"><span>Coupling Strength (g)</span><span id="g-val">0.50</span></div>
        <input type="range" id="g-slider" min="0" max="2" step="0.01" value="0.5">
    </div>

    <div class="slider-group">
        <div class="label-val"><span>Wave Frequency</span><span id="freq-val">1.00</span></div>
        <input type="range" id="freq-slider" min="0.1" max="3" step="0.1" value="1.0">
    </div>

    <div class="slider-group">
        <div class="label-val"><span>Interaction Scale</span><span id="scale-val">1.00</span></div>
        <input type="range" id="scale-slider" min="0.5" max="5" step="0.1" value="1.0">
    </div>

    <div class="legend"><div class="dot-phi"></div> Matter Field (φ)</div>
    <div class="legend"><div class="dot-psi"></div> Spacetime Field (ψ)</div>
    
    <div class="controls-hint">
        🖱️ Left Click: Rotate | 🖱️ Scroll: Zoom | 🖱️ Right Click: Pan
    </div>
</div>

<script id="vertexShader" type="x-shader/x-vertex">
    varying vec2 vUv;
    varying float vPhi;
    varying float vPsi;
    varying float vInteraction;
    
    uniform float uTime;
    uniform float uG;
    uniform float uFreq;
    uniform float uScale;

    void main() {
        vUv = uv;
        
        // Define source points for fields
        vec2 p1 = vec2(0.5, 0.5);
        vec2 p2 = vec2(0.5 + 0.1 * cos(uTime * 0.5), 0.5 + 0.1 * sin(uTime * 0.5));
        
        float d1 = distance(uv, p1);
        float d2 = distance(uv, p2);
        
        // Matter-wave field (phi)
        float phi = sin(d1 * 25.0 * uScale - uTime * uFreq * 3.0) * 0.4;
        
        // Spacetime-wave field (psi)
        float psi = cos(d2 * 18.0 * uScale - uTime * uFreq * 2.2) * 0.4;
        
        // Interaction term: -2.0 * g * sin(phi) * sin(psi)
        float interaction = -2.0 * uG * sin(phi) * sin(psi);
        
        vPhi = phi;
        vPsi = psi;
        vInteraction = interaction;

        vec3 pos = position;
        // The total displacement of the metric
        pos.z += (phi + psi + interaction) * 2.5;
        
        gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
    }
</script>

<script id="fragmentShader" type="x-shader/x-fragment">
    varying vec2 vUv;
    varying float vPhi;
    varying float vPsi;
    varying float vInteraction;
    
    void main() {
        // Dynamic field coloring
        vec3 colorPhi = vec3(0.0, 0.8, 1.0) * (vPhi + 0.5);
        vec3 colorPsi = vec3(1.0, 0.0, 0.4) * (vPsi + 0.5);
        
        // Interaction areas (Particles/Energy Packets)
        float intIntensity = abs(vInteraction);
        vec3 colorInt = vec3(1.0, 0.9, 0.5) * pow(intIntensity * 2.5, 2.0);
        
        vec3 finalColor = mix(colorPhi, colorPsi, 0.5) + colorInt;
        
        // Grid visualization
        float grid = sin(vUv.x * 80.0) * sin(vUv.y * 80.0);
        grid = smoothstep(0.85, 1.0, grid);
        finalColor += grid * 0.15;

        // Depth fading
        gl_FragColor = vec4(finalColor, 1.0);
    }
</script>

<script>
    let scene, camera, renderer, mesh, uniforms, controls;

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020205);

        camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(15, -15, 15);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // Add OrbitControls for mouse interaction
        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.rotateSpeed = 0.8;

        const geometry = new THREE.PlaneGeometry(25, 25, 256, 256);

        uniforms = {
            uTime: { value: 0 },
            uG: { value: 0.5 },
            uFreq: { value: 1.0 },
            uScale: { value: 1.0 }
        };

        const material = new THREE.ShaderMaterial({
            uniforms: uniforms,
            vertexShader: document.getElementById('vertexShader').textContent,
            fragmentShader: document.getElementById('fragmentShader').textContent,
            side: THREE.DoubleSide,
        });

        mesh = new THREE.Mesh(geometry, material);
        scene.add(mesh);

        // Ambience / Field Particles
        const pointsGeom = new THREE.BufferGeometry();
        const pCount = 2000;
        const pCoords = new Float32Array(pCount * 3);
        for(let i=0; i<pCount*3; i++) {
            pCoords[i] = (Math.random() - 0.5) * 50;
        }
        pointsGeom.setAttribute('position', new THREE.BufferAttribute(pCoords, 3));
        const pointsMat = new THREE.PointsMaterial({ 
            color: 0x4444ff, 
            size: 0.05, 
            transparent: true, 
            opacity: 0.5 
        });
        scene.add(new THREE.Points(pointsGeom, pointsMat));

        window.addEventListener('resize', onWindowResize, false);
        setupUI();
        animate();
    }

    function setupUI() {
        const sliders = ['g', 'freq', 'scale'];
        sliders.forEach(id => {
            const el = document.getElementById(`${id}-slider`);
            el.addEventListener('input', (e) => {
                const val = parseFloat(e.target.value);
                uniforms[`u${id.charAt(0).toUpperCase() + id.slice(1)}`].value = val;
                document.getElementById(`${id}-val`).innerText = val.toFixed(2);
            });
        });
    }

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
        requestAnimationFrame(animate);
        uniforms.uTime.value += 0.015;
        controls.update(); // Required for damping
        renderer.render(scene, camera);
    }

    window.onload = init;
</script>
</body>
</html>
