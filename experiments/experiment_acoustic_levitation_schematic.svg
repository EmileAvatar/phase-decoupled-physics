<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 680" width="750" height="680">
  <title>Acoustic Standing Wave Levitation — Standard and Inverted</title>
  <desc>Side-by-side comparison: standard acoustic levitation (external transducer) and inverted configuration (self-oscillating platform). Shows standing wave nodes, trapping positions, and PDTP analogy.</desc>

  <!-- Background -->
  <rect width="750" height="680" fill="#1a1a2e" rx="8"/>

  <!-- Title -->
  <text x="375" y="30" fill="#e0e0e0" font-family="monospace" font-size="15" text-anchor="middle" font-weight="bold">Acoustic Standing Wave Levitation</text>
  <text x="375" y="48" fill="#888" font-family="monospace" font-size="10" text-anchor="middle">Standard (left) vs Inverted / PDTP Analogy (right)</text>

  <!-- Divider line -->
  <line x1="375" y1="60" x2="375" y2="620" stroke="#444" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- ============================================ -->
  <!-- LEFT SIDE: Standard Acoustic Levitation      -->
  <!-- ============================================ -->

  <text x="190" y="78" fill="#4a90d9" font-family="monospace" font-size="13" text-anchor="middle" font-weight="bold">STANDARD</text>
  <text x="190" y="93" fill="#4a90d9" font-family="monospace" font-size="10" text-anchor="middle">External transducer + reflector</text>

  <!-- Transducer (top) -->
  <rect x="120" y="110" width="140" height="25" rx="4" fill="#cc6600" stroke="#ff8800" stroke-width="2"/>
  <text x="190" y="127" fill="white" font-family="monospace" font-size="10" text-anchor="middle">Transducer 40kHz</text>

  <!-- Sound waves emanating down -->
  <line x1="140" y1="135" x2="140" y2="145" stroke="#ff8800" stroke-width="1" opacity="0.5"/>
  <line x1="160" y1="135" x2="160" y2="145" stroke="#ff8800" stroke-width="1" opacity="0.5"/>
  <line x1="180" y1="135" x2="180" y2="145" stroke="#ff8800" stroke-width="1" opacity="0.5"/>
  <line x1="200" y1="135" x2="200" y2="145" stroke="#ff8800" stroke-width="1" opacity="0.5"/>
  <line x1="220" y1="135" x2="220" y2="145" stroke="#ff8800" stroke-width="1" opacity="0.5"/>
  <line x1="240" y1="135" x2="240" y2="145" stroke="#ff8800" stroke-width="1" opacity="0.5"/>

  <!-- Standing wave pattern -->
  <!-- Antinode 1 -->
  <path d="M 120 165 Q 155 150 190 165 Q 225 180 260 165" fill="none" stroke="#ff8800" stroke-width="1.5" opacity="0.4"/>
  <text x="280" y="168" fill="#ff8800" font-family="monospace" font-size="8" opacity="0.6">antinode</text>

  <!-- NODE 1 (trapping position) -->
  <line x1="120" y1="200" x2="260" y2="200" stroke="#00ff88" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="280" y="203" fill="#00ff88" font-family="monospace" font-size="9" font-weight="bold">NODE</text>

  <!-- Trapped bead at node 1 -->
  <circle cx="190" cy="200" r="6" fill="#ffcc00" stroke="#ffaa00" stroke-width="1.5"/>
  <text x="190" y="203" fill="#1a1a2e" font-family="monospace" font-size="7" text-anchor="middle">o</text>

  <!-- Antinode 2 -->
  <path d="M 120 235 Q 155 220 190 235 Q 225 250 260 235" fill="none" stroke="#ff8800" stroke-width="1.5" opacity="0.4"/>
  <text x="280" y="238" fill="#ff8800" font-family="monospace" font-size="8" opacity="0.6">antinode</text>

  <!-- NODE 2 -->
  <line x1="120" y1="270" x2="260" y2="270" stroke="#00ff88" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="280" y="273" fill="#00ff88" font-family="monospace" font-size="9" font-weight="bold">NODE</text>

  <!-- Trapped bead at node 2 -->
  <circle cx="190" cy="270" r="6" fill="#ffcc00" stroke="#ffaa00" stroke-width="1.5"/>

  <!-- Antinode 3 -->
  <path d="M 120 305 Q 155 290 190 305 Q 225 320 260 305" fill="none" stroke="#ff8800" stroke-width="1.5" opacity="0.4"/>

  <!-- NODE 3 -->
  <line x1="120" y1="340" x2="260" y2="340" stroke="#00ff88" stroke-width="2" stroke-dasharray="5,3"/>

  <!-- Antinode 4 -->
  <path d="M 120 375 Q 155 360 190 375 Q 225 390 260 375" fill="none" stroke="#ff8800" stroke-width="1.5" opacity="0.4"/>

  <!-- Reflector (bottom) -->
  <rect x="120" y="400" width="140" height="15" rx="3" fill="#888" stroke="#aaa" stroke-width="2"/>
  <text x="190" y="411" fill="white" font-family="monospace" font-size="9" text-anchor="middle">Reflector</text>

  <!-- Dimension: lambda/2 -->
  <line x1="100" y1="200" x2="100" y2="270" stroke="#aaa" stroke-width="0.5"/>
  <line x1="95" y1="200" x2="105" y2="200" stroke="#aaa" stroke-width="0.5"/>
  <line x1="95" y1="270" x2="105" y2="270" stroke="#aaa" stroke-width="0.5"/>
  <text x="80" y="238" fill="#aaa" font-family="monospace" font-size="8" text-anchor="middle" transform="rotate(-90,80,238)">lambda/2</text>

  <!-- Arrow: external source -->
  <path d="M 80 110 L 115 122" fill="none" stroke="#ff8800" stroke-width="1" marker-end="url(#arrowOrangeSmall)"/>
  <text x="55" y="108" fill="#ff8800" font-family="monospace" font-size="8" text-anchor="middle">External</text>
  <text x="55" y="118" fill="#ff8800" font-family="monospace" font-size="8" text-anchor="middle">source</text>

  <!-- Annotation: passive object -->
  <text x="190" y="220" fill="#ffcc00" font-family="monospace" font-size="8" text-anchor="middle">Passive bead</text>
  <text x="190" y="230" fill="#ffcc00" font-family="monospace" font-size="8" text-anchor="middle">(no power)</text>

  <!-- Driver electronics -->
  <rect x="50" y="440" width="100" height="35" rx="4" fill="#2a2a4a" stroke="#9966ff" stroke-width="1.5"/>
  <text x="100" y="457" fill="#9966ff" font-family="monospace" font-size="9" text-anchor="middle">Arduino +</text>
  <text x="100" y="468" fill="#9966ff" font-family="monospace" font-size="9" text-anchor="middle">L298N</text>
  <line x1="100" y1="440" x2="160" y2="135" stroke="#9966ff" stroke-width="1" stroke-dasharray="3,2"/>

  <rect x="170" y="440" width="100" height="35" rx="4" fill="#2a2a4a" stroke="#ffcc00" stroke-width="1.5"/>
  <text x="220" y="460" fill="#ffcc00" font-family="monospace" font-size="9" text-anchor="middle">12V PSU</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowOrangeSmall" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <path d="M0,0 L6,2.5 L0,5" fill="#ff8800"/>
    </marker>
    <marker id="arrowGreen" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <path d="M0,0 L6,2.5 L0,5" fill="#00ff88"/>
    </marker>
    <marker id="arrowCyan" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <path d="M0,0 L6,2.5 L0,5" fill="#00ccff"/>
    </marker>
  </defs>

  <!-- ============================================ -->
  <!-- RIGHT SIDE: Inverted / PDTP Analogy          -->
  <!-- ============================================ -->

  <text x="560" y="78" fill="#ff4488" font-family="monospace" font-size="13" text-anchor="middle" font-weight="bold">INVERTED (PDTP)</text>
  <text x="560" y="93" fill="#ff4488" font-family="monospace" font-size="10" text-anchor="middle">Object generates its own wave</text>

  <!-- Thread from top -->
  <line x1="560" y1="105" x2="560" y2="155" stroke="#aaa" stroke-width="1"/>
  <text x="575" y="120" fill="#aaa" font-family="monospace" font-size="8">thread</text>

  <!-- Mounting bar -->
  <line x1="510" y1="105" x2="610" y2="105" stroke="#aaa" stroke-width="2"/>

  <!-- Platform with piezo -->
  <rect x="510" y="155" width="100" height="20" rx="3" fill="#8B6914" stroke="#cc9933" stroke-width="1.5"/>
  <text x="560" y="168" fill="white" font-family="monospace" font-size="8" text-anchor="middle">Balsa + Piezo</text>

  <!-- Piezo on underside -->
  <rect x="540" y="175" width="40" height="8" rx="2" fill="#cc6600" stroke="#ff8800" stroke-width="1"/>
  <text x="560" y="196" fill="#ff8800" font-family="monospace" font-size="8" text-anchor="middle">40 kHz emitter</text>

  <!-- Sound waves emanating DOWN from platform -->
  <line x1="530" y1="183" x2="530" y2="195" stroke="#ff8800" stroke-width="1" opacity="0.5"/>
  <line x1="545" y1="183" x2="545" y2="195" stroke="#ff8800" stroke-width="1" opacity="0.5"/>
  <line x1="560" y1="183" x2="560" y2="198" stroke="#ff8800" stroke-width="1.5" opacity="0.6"/>
  <line x1="575" y1="183" x2="575" y2="195" stroke="#ff8800" stroke-width="1" opacity="0.5"/>
  <line x1="590" y1="183" x2="590" y2="195" stroke="#ff8800" stroke-width="1" opacity="0.5"/>

  <!-- Standing wave between platform and reflector -->
  <!-- Antinode 1 -->
  <path d="M 490 225 Q 525 212 560 225 Q 595 238 630 225" fill="none" stroke="#ff8800" stroke-width="1.5" opacity="0.4"/>

  <!-- NODE (trapping) -->
  <line x1="490" y1="260" x2="630" y2="260" stroke="#00ff88" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="645" y="263" fill="#00ff88" font-family="monospace" font-size="9" font-weight="bold">NODE</text>

  <!-- Trapped bead -->
  <circle cx="560" cy="260" r="6" fill="#ffcc00" stroke="#ffaa00" stroke-width="1.5"/>

  <!-- Antinode 2 -->
  <path d="M 490 295 Q 525 282 560 295 Q 595 308 630 295" fill="none" stroke="#ff8800" stroke-width="1.5" opacity="0.4"/>

  <!-- Reflector -->
  <rect x="490" y="325" width="140" height="15" rx="3" fill="#888" stroke="#aaa" stroke-width="2"/>
  <text x="560" y="336" fill="white" font-family="monospace" font-size="9" text-anchor="middle">Reflector</text>

  <!-- Annotation: ACTIVE source -->
  <path d="M 500 165 L 505 165" fill="none" stroke="#ff4488" stroke-width="1.5" marker-end="url(#arrowPink)"/>
  <text x="480" y="155" fill="#ff4488" font-family="monospace" font-size="8" text-anchor="end">ACTIVE</text>
  <text x="480" y="165" fill="#ff4488" font-family="monospace" font-size="8" text-anchor="end">source</text>
  <text x="480" y="175" fill="#ff4488" font-family="monospace" font-size="8" text-anchor="end">(on object)</text>

  <defs>
    <marker id="arrowPink" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <path d="M0,0 L6,2.5 L0,5" fill="#ff4488"/>
    </marker>
  </defs>

  <!-- Reaction force arrow (upward on platform) -->
  <path d="M 620 165 L 620 140" fill="none" stroke="#00ccff" stroke-width="2" marker-end="url(#arrowCyan)"/>
  <text x="650" y="145" fill="#00ccff" font-family="monospace" font-size="8">Reaction</text>
  <text x="650" y="155" fill="#00ccff" font-family="monospace" font-size="8">force</text>
  <text x="650" y="165" fill="#00ccff" font-family="monospace" font-size="8">(upward)</text>

  <!-- Thin wires to driver -->
  <path d="M 540 175 Q 500 200 480 300 Q 470 380 500 420" fill="none" stroke="#9966ff" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="465" y="310" fill="#9966ff" font-family="monospace" font-size="7" transform="rotate(-80,465,310)">thin wire</text>

  <!-- Driver electronics -->
  <rect x="490" y="440" width="100" height="35" rx="4" fill="#2a2a4a" stroke="#9966ff" stroke-width="1.5"/>
  <text x="540" y="457" fill="#9966ff" font-family="monospace" font-size="9" text-anchor="middle">Arduino +</text>
  <text x="540" y="468" fill="#9966ff" font-family="monospace" font-size="9" text-anchor="middle">L298N</text>

  <rect x="610" y="440" width="80" height="35" rx="4" fill="#2a2a4a" stroke="#ffcc00" stroke-width="1.5"/>
  <text x="650" y="460" fill="#ffcc00" font-family="monospace" font-size="9" text-anchor="middle">12V PSU</text>

  <!-- ============================================ -->
  <!-- BOTTOM: PDTP Analogy Mapping                 -->
  <!-- ============================================ -->

  <rect x="30" y="500" width="690" height="110" rx="6" fill="#1a1a2e" stroke="#555" stroke-width="1"/>
  <text x="375" y="520" fill="#e0e0e0" font-family="monospace" font-size="12" text-anchor="middle" font-weight="bold">PDTP Analogy Mapping</text>

  <!-- Table -->
  <text x="60" y="540" fill="#ff8800" font-family="monospace" font-size="9">Acoustic</text>
  <text x="260" y="540" fill="#ff4488" font-family="monospace" font-size="9">PDTP Decoupling</text>
  <text x="520" y="540" fill="#888" font-family="monospace" font-size="9">Confidence</text>

  <line x1="50" y1="545" x2="700" y2="545" stroke="#444" stroke-width="0.5"/>

  <text x="60" y="558" fill="#ccc" font-family="monospace" font-size="8">Pressure wave in air</text>
  <text x="260" y="558" fill="#ccc" font-family="monospace" font-size="8">Phase wave in condensate phi</text>
  <text x="520" y="558" fill="#00ff88" font-family="monospace" font-size="8">HIGH (wave eq. same form)</text>

  <text x="60" y="572" fill="#ccc" font-family="monospace" font-size="8">Node: net acoustic force = 0</text>
  <text x="260" y="572" fill="#ccc" font-family="monospace" font-size="8">Node: alpha = cos(psi-phi) = 0</text>
  <text x="520" y="572" fill="#00ff88" font-family="monospace" font-size="8">HIGH (node = decoupled)</text>

  <text x="60" y="586" fill="#ccc" font-family="monospace" font-size="8">Object at node: levitates</text>
  <text x="260" y="586" fill="#ccc" font-family="monospace" font-size="8">Craft at node: weightless</text>
  <text x="520" y="586" fill="#ffcc00" font-family="monospace" font-size="8">MEDIUM (mechanism same)</text>

  <text x="60" y="600" fill="#ccc" font-family="monospace" font-size="8">Self-oscillation: weak in air</text>
  <text x="260" y="600" fill="#ccc" font-family="monospace" font-size="8">Self-oscillation: coupling = g</text>
  <text x="520" y="600" fill="#ff4444" font-family="monospace" font-size="8">LOW (untested)</text>

  <!-- Legend -->
  <rect x="30" y="625" width="690" height="42" rx="6" fill="#1a1a2e" stroke="#444" stroke-width="1"/>
  <text x="50" y="642" fill="#e0e0e0" font-family="monospace" font-size="10" font-weight="bold">Legend:</text>

  <circle cx="130" cy="638" r="5" fill="#ffcc00" stroke="#ffaa00" stroke-width="1"/>
  <text x="140" y="642" fill="#ffcc00" font-family="monospace" font-size="9">Trapped bead</text>

  <line x1="230" y1="638" x2="260" y2="638" stroke="#00ff88" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="268" y="642" fill="#00ff88" font-family="monospace" font-size="9">Pressure node</text>

  <path d="M 380 638 Q 395 630 410 638 Q 425 646 440 638" fill="none" stroke="#ff8800" stroke-width="1.5" opacity="0.5"/>
  <text x="448" y="642" fill="#ff8800" font-family="monospace" font-size="9">Standing wave</text>

  <line x1="570" y1="638" x2="590" y2="628" stroke="#00ccff" stroke-width="2" marker-end="url(#arrowCyan)"/>
  <text x="598" y="642" fill="#00ccff" font-family="monospace" font-size="9">Reaction force</text>
</svg>