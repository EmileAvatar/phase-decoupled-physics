<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 750" width="700" height="750">
  <title>Phase-Gradient Coil Drum — Top-Down Schematic</title>
  <desc>Toroidal coil array with YBCO superconductor ring inside, on precision scale. 6 coils at 60-degree spacing create traveling EM phase wave.</desc>

  <!-- Background -->
  <rect width="700" height="750" fill="#1a1a2e" rx="8"/>

  <!-- Title -->
  <text x="350" y="32" fill="#e0e0e0" font-family="monospace" font-size="16" text-anchor="middle" font-weight="bold">Phase-Gradient Coil Drum — Top-Down Schematic</text>
  <text x="350" y="52" fill="#888" font-family="monospace" font-size="11" text-anchor="middle">Toroidal coil array + YBCO superconductor ring</text>

  <!-- Precision scale platform (outer rectangle) -->
  <rect x="120" y="80" width="460" height="460" rx="12" fill="none" stroke="#555" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="350" y="100" fill="#555" font-family="monospace" font-size="10" text-anchor="middle">Precision scale platform (0.01g resolution)</text>

  <!-- Styrofoam dewar (circle) -->
  <circle cx="350" cy="320" r="195" fill="none" stroke="#4a90d9" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="350" y="140" fill="#4a90d9" font-family="monospace" font-size="10" text-anchor="middle">Styrofoam dewar (LN2, 77K)</text>

  <!-- Toroidal former (outer ring) -->
  <circle cx="350" cy="320" r="160" fill="none" stroke="#8B4513" stroke-width="18" opacity="0.3"/>
  <circle cx="350" cy="320" r="160" fill="none" stroke="#8B4513" stroke-width="2"/>
  <text x="540" y="200" fill="#8B4513" font-family="monospace" font-size="9" text-anchor="start">Fiberglass</text>
  <text x="540" y="212" fill="#8B4513" font-family="monospace" font-size="9" text-anchor="start">former</text>

  <!-- YBCO superconductor ring (inner ring) -->
  <circle cx="350" cy="320" r="85" fill="none" stroke="#00ff88" stroke-width="14" opacity="0.2"/>
  <circle cx="350" cy="320" r="85" fill="none" stroke="#00ff88" stroke-width="2"/>
  <circle cx="350" cy="320" r="72" fill="none" stroke="#00ff88" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="350" y="316" fill="#00ff88" font-family="monospace" font-size="11" text-anchor="middle">YBCO Ring</text>
  <text x="350" y="330" fill="#00ff88" font-family="monospace" font-size="9" text-anchor="middle">(superconducting</text>
  <text x="350" y="342" fill="#00ff88" font-family="monospace" font-size="9" text-anchor="middle">below 93K)</text>

  <!-- Traveling wave direction arrow (curved) -->
  <path d="M 410 165 A 160 160 0 0 1 480 215" fill="none" stroke="#ff6600" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <text x="470" y="175" fill="#ff6600" font-family="monospace" font-size="10" text-anchor="start">Traveling</text>
  <text x="470" y="187" fill="#ff6600" font-family="monospace" font-size="10" text-anchor="start">phase wave</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#ff6600"/>
    </marker>
    <marker id="arrowYellow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#ffcc00"/>
    </marker>
  </defs>

  <!-- 6 Coils at 60-degree spacing -->
  <!-- Coil 1: 0 deg (top) -->
  <g transform="translate(350,160)">
    <rect x="-22" y="-16" width="44" height="32" rx="6" fill="#cc4400" stroke="#ff6600" stroke-width="2"/>
    <text x="0" y="1" fill="white" font-family="monospace" font-size="9" text-anchor="middle">Coil 1</text>
    <text x="0" y="12" fill="#ffcc00" font-family="monospace" font-size="8" text-anchor="middle">0 deg</text>
  </g>

  <!-- Coil 2: 60 deg (upper right) -->
  <g transform="translate(489,240)">
    <rect x="-22" y="-16" width="44" height="32" rx="6" fill="#cc4400" stroke="#ff6600" stroke-width="2"/>
    <text x="0" y="1" fill="white" font-family="monospace" font-size="9" text-anchor="middle">Coil 2</text>
    <text x="0" y="12" fill="#ffcc00" font-family="monospace" font-size="8" text-anchor="middle">60 deg</text>
  </g>

  <!-- Coil 3: 120 deg (lower right) -->
  <g transform="translate(489,400)">
    <rect x="-22" y="-16" width="44" height="32" rx="6" fill="#cc4400" stroke="#ff6600" stroke-width="2"/>
    <text x="0" y="1" fill="white" font-family="monospace" font-size="9" text-anchor="middle">Coil 3</text>
    <text x="0" y="12" fill="#ffcc00" font-family="monospace" font-size="8" text-anchor="middle">120 deg</text>
  </g>

  <!-- Coil 4: 180 deg (bottom) -->
  <g transform="translate(350,480)">
    <rect x="-22" y="-16" width="44" height="32" rx="6" fill="#cc4400" stroke="#ff6600" stroke-width="2"/>
    <text x="0" y="1" fill="white" font-family="monospace" font-size="9" text-anchor="middle">Coil 4</text>
    <text x="0" y="12" fill="#ffcc00" font-family="monospace" font-size="8" text-anchor="middle">180 deg</text>
  </g>

  <!-- Coil 5: 240 deg (lower left) -->
  <g transform="translate(211,400)">
    <rect x="-22" y="-16" width="44" height="32" rx="6" fill="#cc4400" stroke="#ff6600" stroke-width="2"/>
    <text x="0" y="1" fill="white" font-family="monospace" font-size="9" text-anchor="middle">Coil 5</text>
    <text x="0" y="12" fill="#ffcc00" font-family="monospace" font-size="8" text-anchor="middle">240 deg</text>
  </g>

  <!-- Coil 6: 300 deg (upper left) -->
  <g transform="translate(211,240)">
    <rect x="-22" y="-16" width="44" height="32" rx="6" fill="#cc4400" stroke="#ff6600" stroke-width="2"/>
    <text x="0" y="1" fill="white" font-family="monospace" font-size="9" text-anchor="middle">Coil 6</text>
    <text x="0" y="12" fill="#ffcc00" font-family="monospace" font-size="8" text-anchor="middle">300 deg</text>
  </g>

  <!-- Phase wave direction indicators (small arrows between coils) -->
  <!-- Arrow from Coil 1 to Coil 2 -->
  <path d="M 380 170 Q 430 180 460 220" fill="none" stroke="#ff6600" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrowOrange)"/>
  <!-- Arrow from Coil 2 to Coil 3 -->
  <path d="M 500 260 Q 510 320 500 380" fill="none" stroke="#ff6600" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrowOrange)"/>
  <!-- Arrow from Coil 3 to Coil 4 -->
  <path d="M 470 420 Q 430 460 380 475" fill="none" stroke="#ff6600" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrowOrange)"/>
  <!-- Arrow from Coil 4 to Coil 5 -->
  <path d="M 320 475 Q 270 460 240 420" fill="none" stroke="#ff6600" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrowOrange)"/>
  <!-- Arrow from Coil 5 to Coil 6 -->
  <path d="M 200 380 Q 190 320 200 260" fill="none" stroke="#ff6600" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrowOrange)"/>
  <!-- Arrow from Coil 6 to Coil 1 -->
  <path d="M 230 225 Q 270 180 320 168" fill="none" stroke="#ff6600" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrowOrange)"/>

  <!-- External equipment -->
  <!-- Controller (STM32) -->
  <rect x="20" y="580" width="130" height="50" rx="6" fill="#2a2a4a" stroke="#9966ff" stroke-width="2"/>
  <text x="85" y="602" fill="#9966ff" font-family="monospace" font-size="10" text-anchor="middle">STM32 + DDS</text>
  <text x="85" y="616" fill="#9966ff" font-family="monospace" font-size="9" text-anchor="middle">(controller)</text>

  <!-- Amplifiers -->
  <rect x="170" y="580" width="130" height="50" rx="6" fill="#2a2a4a" stroke="#ff4444" stroke-width="2"/>
  <text x="235" y="602" fill="#ff4444" font-family="monospace" font-size="10" text-anchor="middle">3x TDA2030</text>
  <text x="235" y="616" fill="#ff4444" font-family="monospace" font-size="9" text-anchor="middle">(amplifiers)</text>

  <!-- Power supply -->
  <rect x="320" y="580" width="130" height="50" rx="6" fill="#2a2a4a" stroke="#ffcc00" stroke-width="2"/>
  <text x="385" y="602" fill="#ffcc00" font-family="monospace" font-size="10" text-anchor="middle">12V 5A PSU</text>
  <text x="385" y="616" fill="#ffcc00" font-family="monospace" font-size="9" text-anchor="middle">(power)</text>

  <!-- Laptop -->
  <rect x="470" y="580" width="130" height="50" rx="6" fill="#2a2a4a" stroke="#44aaff" stroke-width="2"/>
  <text x="535" y="602" fill="#44aaff" font-family="monospace" font-size="10" text-anchor="middle">Laptop</text>
  <text x="535" y="616" fill="#44aaff" font-family="monospace" font-size="9" text-anchor="middle">(data logging)</text>

  <!-- Connection lines from controller to amps to coils -->
  <line x1="150" y1="605" x2="170" y2="605" stroke="#9966ff" stroke-width="1.5"/>
  <line x1="300" y1="605" x2="320" y2="605" stroke="#ffcc00" stroke-width="1.5"/>
  <line x1="85" y1="580" x2="85" y2="570" stroke="#44aaff" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="85" y1="570" x2="535" y2="570" stroke="#44aaff" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="535" y1="570" x2="535" y2="580" stroke="#44aaff" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Wire bundle from amps to coil drum -->
  <path d="M 235 580 L 235 555 Q 235 545 245 545 L 340 545 Q 350 545 350 535 L 350 510" fill="none" stroke="#ff4444" stroke-width="2"/>
  <text x="300" y="540" fill="#ff4444" font-family="monospace" font-size="8">3-phase wires</text>
  <text x="300" y="552" fill="#ff4444" font-family="monospace" font-size="8">(loose drape)</text>

  <!-- Scale readout wire -->
  <line x1="535" y1="580" x2="535" y2="530" stroke="#44aaff" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="560" y="555" fill="#44aaff" font-family="monospace" font-size="8">USB</text>

  <!-- Mu-metal shield (optional) -->
  <rect x="140" y="500" width="420" height="20" rx="3" fill="#666" stroke="#999" stroke-width="1" opacity="0.5"/>
  <text x="350" y="514" fill="#999" font-family="monospace" font-size="8" text-anchor="middle">Mu-metal shield (optional) between assembly and scale</text>

  <!-- Legend -->
  <rect x="20" y="655" width="660" height="80" rx="6" fill="#1a1a2e" stroke="#444" stroke-width="1"/>
  <text x="35" y="674" fill="#e0e0e0" font-family="monospace" font-size="11" font-weight="bold">Legend:</text>

  <!-- Legend items row 1 -->
  <rect x="35" y="682" width="14" height="10" rx="2" fill="#cc4400" stroke="#ff6600" stroke-width="1"/>
  <text x="55" y="691" fill="#ff6600" font-family="monospace" font-size="9">Copper coils (100 turns each)</text>

  <rect x="270" y="682" width="14" height="10" rx="2" fill="none" stroke="#00ff88" stroke-width="1"/>
  <text x="290" y="691" fill="#00ff88" font-family="monospace" font-size="9">YBCO ring (40mm OD, 93K T_c)</text>

  <rect x="510" y="682" width="14" height="10" rx="2" fill="none" stroke="#8B4513" stroke-width="1"/>
  <text x="530" y="691" fill="#8B4513" font-family="monospace" font-size="9">Fiberglass former</text>

  <!-- Legend items row 2 -->
  <line x1="35" y1="710" x2="49" y2="710" stroke="#ff6600" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="55" y="714" fill="#ff6600" font-family="monospace" font-size="9">Phase wave direction (CW)</text>

  <line x1="270" y1="710" x2="284" y2="710" stroke="#4a90d9" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="290" y="714" fill="#4a90d9" font-family="monospace" font-size="9">LN2 dewar boundary</text>

  <line x1="510" y1="710" x2="524" y2="710" stroke="#555" stroke-width="1.5" stroke-dasharray="8,4"/>
  <text x="530" y="714" fill="#555" font-family="monospace" font-size="9">Scale platform</text>

  <!-- Dimensions -->
  <!-- Toroid diameter -->
  <line x1="190" y1="130" x2="510" y2="130" stroke="#aaa" stroke-width="0.5"/>
  <line x1="190" y1="125" x2="190" y2="135" stroke="#aaa" stroke-width="0.5"/>
  <line x1="510" y1="125" x2="510" y2="135" stroke="#aaa" stroke-width="0.5"/>
  <text x="350" y="126" fill="#aaa" font-family="monospace" font-size="9" text-anchor="middle">180 mm (toroid OD)</text>

  <!-- YBCO diameter -->
  <line x1="265" y1="365" x2="435" y2="365" stroke="#00ff88" stroke-width="0.5" opacity="0.5"/>
  <text x="350" y="380" fill="#00ff88" font-family="monospace" font-size="8" text-anchor="middle" opacity="0.7">40 mm (YBCO OD)</text>
</svg>